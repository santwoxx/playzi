    <style>
      body, html {
        background-color: #06070a;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #06070a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease-out;
      }
      .loader-logo {
        width: 80px;
        height: 80px;
        filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4));
        animation: pulse 2s infinite ease-in-out;
      }
      .loader-bar {
        width: 120px;
        height: 2px;
        background: rgba(255,255,255,0.1);
        margin-top: 20px;
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      .loader-progress {
        position: absolute;
        height: 100%;
        background: linear-gradient(90deg, #00f2ff, #9d00ff);
        width: 30%;
        animation: loading 1.5s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.1); opacity: 1; }
      }
      @keyframes loading {
        0% { left: -30%; }
        100% { left: 100%; }
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- End Google Tag Manager (noscript) -->

    <!-- Initial Landing Loader -->
    <div id="initial-loader">
      <img src="https://i.ibb.co/svpJKdbx/playsi-logo.png" alt="Playsi" class="loader-logo">
      <div class="loader-bar">
        <div class="loader-progress"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide loader when React app is mounted
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
          }
        }, 300);
      });
    </script>
  </body>
